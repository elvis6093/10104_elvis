<!DOCTYPE html>
<html>
    <head>
        <title>Forms</title>
    </head>
    <body style="background-color: #1DB954;">
        <form align="left">
            <iframe width="560" height="315" src="https://www.youtube.com/embed/vxD5IhtUW34?si=hoz4NtT9Y3u2MwHP" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            <label style="font-size: 25px;"><u><b>Please fill the form</b></u></label><br><br>
            <label><b>Name</b></label><input type="text" size="10" required><br><br>
            <label><b>Email</b></label><input type="email" size="10" required><br><br>
            <label><b>Hobbies:</b></label><br>
            <label><b>Football</b></label><input type="checkbox"><br>
            <label><b>Basketball</b></label><input type="checkbox"><br>
            <label><b>Hockey</b></label><input type="checkbox"><br><br>
            <label><b>Gender:</b></label>
            <label>Male</label><input type="radio" name="Gender"> 
            <label>Female</label><input type="radio" name="Gender"><br><br>
            <label><b>Course</b></label>
            <select>
                <option>ICT</option>
                <option>Electrical</option>
                <option>Building Technology</option>
                <option>Fashion & Design</option>
                <option>Hair & Beauty</option>
            </select>
            <br><br>
            <label><b>Password</b></label><input type="password"size="10" required maxlength="4"><br><br>
            <input type="Submit" value="SUBMIT" style="font-weight: bold;">
            <input type="reset" value="CANCEL" style="font-weight: bold;">
        </form>


        <iframe width="560" height="315" src="https://www.youtube.com/embed/Ahy12bzmtSo?si=cAGhSA-o0zshGJIh" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </body>
</html>
