<!DOCTYPE html>
<html>
    <head>
        <title>Nested list</title>
    </head>
    <body>
        <h1>Countries list:</h1>
        <ol>
            <li>Kenya
            <ul>
                <li>Nairobi</li>
                <li>Mombasa</li>
            </ul>
            </li>
            <li>Uganda</li>
            <li>Tanzania
            <ol type="i">
                <li>Dodoma</li>
                <li>Arusha</li>
            </ol>
            </li>
        </ol>
    </body>
</html>
