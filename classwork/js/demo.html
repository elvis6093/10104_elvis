<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="sytlesheet" href="style.css">
</head>
<body>
    <table class="details">
      <h1><u>Student Details</u></h1>
      <tr>
        <td>First Name:</td>
        <td id="fName"></td>
      </tr>
      <tr>
        <td>Second Name:</td>
        <td id="sName"></td>
      </tr>
      <tr>
        <td>Marks:</td>
        <td id="fMarks"></td>
      </tr>
      <tr>
        <td>GPA:</td>
        <td id="gpa"></td>
      </tr>
      <tr>
        <td colspan="2" align="center">
          <b><u>FEES</u></b>
        </td>
      </tr>
      <tr>
        <td>First Term:</td>
        <td id="fTermFees"></td>
      </tr>
      <tr>
        <td>Second Term:</td>
        <td id="sTermFees"></td>
      </tr>
      <tr>
        <td>Third Term:</td>
        <td id="tTermFees"></td>
      </tr>
      <tr>
        <td>TOTAL:</td>
        <td id="total"></td>
      </tr>
    </table>
    <script src="script.js"></script>
</body>
</html>
