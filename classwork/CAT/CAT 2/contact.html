<!DOCTYPE html>
<html>
    <head>
        <title>form</title>
        <link rel="stylesheet" type="text/css" href="style.css">
    </head>
    <body>
        <form class="form-group">
            <table>
                <caption>Contact Us Form Example</caption>
                <tr>
                    <td>
                        <label>Name
                            <span class="required">*</span> 
                        </label>
                    </td>
                    <td>
                        <input type="text" placeholder="enter your name" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label>Phone Number </label>
                    </td>
                    <td>
                        <input type="tel" placeholder="+254...">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label>Email Address
                            <span class="required">*</span> 
                         </label>
                    </td>
                    <td>
                        <input type="email" placeholder="name@gmail.com" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label>Comments
                            <span class="required">*</span> 
                         </label>
                    </td>
                    <td>
                        <textarea placeholder="tell us about yourself" required></textarea>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label>
                            <span class="required">*</span> 
                        required fields</label>
                    </td>
                    <td>
                        <input type="submit" value="Submit" id="submit">
                    </td>
                    <td>
                        <a href="#">forms</a>
                    </td>
                </tr>
            </table>
        </form>
        <div class="marquee">
                <p>Designed By Elvis</p>
            </div>
    </body>
</html>
